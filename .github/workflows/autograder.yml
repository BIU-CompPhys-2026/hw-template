name: Autograder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout student repo
        uses: actions/checkout@v4

      - name: Checkout hidden tests
        uses: actions/checkout@v4
        with:
          repository: BIU-CompPhys-2026/hidden-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: .hidden-tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run public tests
        run: pytest tests/ -v --tb=short 2>&1 | head -100

      - name: Run hidden tests
        run: pytest .hidden-tests/ -v --tb=short 2>&1 | head -100
